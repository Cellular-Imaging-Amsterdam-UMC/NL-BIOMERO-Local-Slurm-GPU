# /etc/slurm/gres.conf - GPU Generic Resource (GRES) Configuration
#
# Each worker node (c1, c2) is configured with 1 GPU via NVIDIA Container Toolkit.
# The host GPU(s) are shared across all worker containers.
#
# If your host has multiple GPUs, update the Gres=gpu:N count in slurm.conf accordingly.
# On Docker Desktop (WSL2), /dev/nvidia0 does not exist; GPU access is via /dev/dxg.

NodeName=c1 Name=gpu File=/dev/dxg Count=1
