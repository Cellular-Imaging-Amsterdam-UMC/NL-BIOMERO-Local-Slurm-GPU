services:
  mysql:
    image: mariadb:10.10
    hostname: mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: password
    volumes:
      - gpu_var_lib_mysql:/var/lib/mysql

  slurmdbd:
    build:
      context: .
      args:
        SLURM_TAG: ${SLURM_TAG:-slurm-21-08-6-1}
    command: ["slurmdbd"]
    hostname: slurmdbd
    volumes:
      - gpu_etc_munge:/etc/munge
      - gpu_etc_slurm:/etc/slurm
      - gpu_var_log_slurm:/var/log/slurm
    expose:
      - "6819"
    depends_on:
      - mysql

  slurmctld:
    # image: slurm-docker-cluster:${IMAGE_TAG:-21.08.6}
    # Build this image from current folder
    # Use a specific file: Dockerfile_slurmctld
    build: 
      context: ./
      dockerfile: Dockerfile_slurmctld
    command: ["slurmctld"]
    privileged: true
    hostname: slurmctld
    volumes:
      - gpu_etc_munge:/etc/munge
      - gpu_etc_slurm:/etc/slurm
      - gpu_slurm_jobdir:/data
      - gpu_var_log_slurm:/var/log/slurm
      - gpu_home_cache:/home/slurm
    expose:
      - "6817"
    ports:
      - "2222:22"
    depends_on:
      - "slurmdbd"

  c1:
    build:
      context: .
      args:
        SLURM_TAG: ${SLURM_TAG:-slurm-21-08-6-1}
    command: ["slurmd"]
    hostname: c1
    privileged: true
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      APPTAINER_CACHEDIR: /data/.apptainer_cache
    volumes:
      - gpu_etc_munge:/etc/munge
      - gpu_etc_slurm:/etc/slurm
      - gpu_slurm_jobdir:/data
      - gpu_var_log_slurm:/var/log/slurm
      - gpu_home_cache:/home/slurm
    expose:
      - "6818"
    depends_on:
      - "slurmctld"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  c2:
    build:
      context: .
      args:
        SLURM_TAG: ${SLURM_TAG:-slurm-21-08-6-1}
    command: ["slurmd"]
    hostname: c2
    privileged: true
    environment:
      APPTAINER_CACHEDIR: /data/.apptainer_cache
    volumes:
      - gpu_etc_munge:/etc/munge
      - gpu_etc_slurm:/etc/slurm
      - gpu_slurm_jobdir:/data
      - gpu_var_log_slurm:/var/log/slurm
      - gpu_home_cache:/home/slurm
    expose:
      - "6818"
    depends_on:
      - "slurmctld"

volumes:
  gpu_etc_munge:
  gpu_etc_slurm:
  gpu_slurm_jobdir:
  gpu_var_lib_mysql:
  gpu_var_log_slurm:
  gpu_home_cache:
